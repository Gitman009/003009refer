name: 'Daily Cooe Capture & Send'

on:
  schedule:
    - cron: '0 17 * * *'   # 10:20 PM IST (16:50 UTC)
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run script
        env:
          COOE_API_TOKEN: ${{ secrets.COOE_API_TOKEN }}
          COOE_COOKIE: ${{ secrets.COOE_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
